localStrage: ブラウザに備わっている簡易的なデータベース。
 ここにデータを保存すれば、ブラウザを閉じてもデータは消えない。
    ・setItem('key', 'value')でデータを保存。
    ・getIten('key')でデータを取り出す。


forEach
一般的な構文
-----------------------------
var array = [配列データ];

array.forEach(コールバック関数)
-----------------------------
サンプル例
var items = [ 'バナナ', 'リンゴ', 'メロン', 'ブドウ' ];

items.forEach(function(value) {
     console.log( value );
});


★forEachは配列の先頭から順番に一つずつ要素を取りだしてくれる。
コールバック関数とは：一つのデータが来るたびに実行される処理の実行指示書というイメージ。
後でデータが来たらforEachはこの関数を呼び出す(call back)してね！

coffeeLogs.forEach(function(log) {
        renderCard(log);
    });

1.配列 coffeeLogs「データがたくさんあるぞ!」一つ取り出す
⇓
2.ループ処理 forEach「おい!次のデータ1件渡すぞ!」一つデータを投げる
⇓
3.受け取り役 function(log)「はい!logという名前の箱で受け取りました!」その箱をそのままrenderに渡す
⇓
4.実行役 renderCard(log) 「よし、そのlogの中身を使ってHTMLを作るぜ!」



${}について
テンプレートリテラルと呼ばれるもの。
役割：文字列の中に変数を埋め込むために使われる。
例:
const country = "エチオピア";
const text = `${country}産の豆`;



カスタムデータ属性
htmlタグに独自の属性を指定する属性。オリジナルの属性も作成できる。
app.jsでは「data-id = "${log.id}"」で使われている。
カスタムデータ属性の名前は常にdataから始まる。
プログラムではなぜdata-idを使ったのか？
➡削除ボタンはカードが増えるたびに何個も作られ、id="delete-btn"と
書いてしまうと、ページ内に同じIDがたくさんできてしまい、ルール違反となる。
だが、「このボタンを押したら、データベース上のNo.????のデータを消したい」という
情報は持たせておきたい。そこで、見た目には影響しない隠しポケット(data-id)にそのデータの
番号を持たせておけばいい。



dataset.idとは?
HTMLの隠しポケット(data-xxx)の中身を、javascriptで取り出すための呪文。
・HTML側: data-xxx = "値"と書くと...
・JS側: element.dataset.xxxでその値が取れる。
例：
HTML側
<button class="delete-btn" data-id="12345"> 🗑️ </button>

JS側
// ボタン要素.dataset.id と書くと、ポケットの中身が取り出せる
const deleteId = deleteBtn.dataset.id; 
console.log(deleteId); // "12345" が出る！



アロー関数(関数(function)の省略形)
log => log.id !== deleteId
従来の書き方：
coffeeLogs.filter(function(log) {
    // IDが一致しないならTrueを返す
    return log.id !== deleteId
});

今の書き方
functionを消して、カッコの後に矢印(=>)をつける。
1行だけならreturn も {} も省略できる。
coffeeLogs.filter( log => log.id !== deleteId)


e.targetについて
クリックなどのイベントが発生したDOM要素(HTMLタグ)を
参照するイベントオブジェクトプロパティ。ユーザが操作した具体的な
箇所を取得し、動的な処理やフォーム入力値の取得に必須





データ入力から表示までのフロー
1.document.getElementById().valueで新しいデータを取得

2.
・JSでDate.now()で新しいデータにIDが割り振られる。
・バラバラだった国名や名前が、オブジェクトlogにまとめられる。

3.分岐点(ここでデータは2つの場所に送られる。)
・ルートA(永続化): coffeeLogs配列に入り、さらに文字列に変換されてlocalStrageに送られる
・ルートB(表示): renderCard(log)に渡されて、HTMLの形に整形されて画面へ。



レーダーチャートについて、基本的な流れ

// ステップ1: canvas要素を取得
const ctx = document.getElementById('canvasのID');

// ステップ2: new Chartでチャートを作成
